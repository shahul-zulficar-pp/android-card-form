# .github/workflows/build-and-upload.yml
name: Build and Upload

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # persist-credentials defaults to true
        # GITHUB_TOKEN is stored in .git/config after this step

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # LINE 20: dangerous-artefact fires here
      # path: . uploads the entire workspace including .git/config
      # .git/config contains the GITHUB_TOKEN stored by actions/checkout
      # anyone with read access to the repo can download this artifact
      # and extract the token from .git/config
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .                        # <-- entire workspace including .git/
          retention-days: 7
