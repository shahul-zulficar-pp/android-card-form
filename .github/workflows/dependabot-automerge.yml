# .github/workflows/dependabot-automerge.yml
name: Dependabot Auto Merge

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest

    # LINE 16: bot-check fires here
    # github.actor is the LAST person to interact with the PR
    # an attacker can force-push via Dependabot to make github.actor == 'dependabot[bot]'
    # this check is bypassable as documented in Synacktiv's Dependabot exploitation article
    if: ${{ github.actor == 'dependabot[bot]' }}

    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
